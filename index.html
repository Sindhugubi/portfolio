<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Personal Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
        <span>TaskFlow</span>
      </div>
      <div class="header-stats">
        <span id="stat-total">0 tasks</span>
        <span class="dot">·</span>
        <span id="stat-done" class="stat-done">0 done</span>
      </div>
    </div>
  </header>

  <main class="main">

    <section class="form-card" aria-label="Add new task">
      <h2 class="form-title">Add a task</h2>
      <form id="task-form" novalidate>
        <div class="field-row">
          <div class="field field--grow">
            <label for="task-title">Title <span class="required" aria-hidden="true">*</span></label>
            <input id="task-title" type="text" placeholder="e.g. Review project proposal" autocomplete="off" />
            <span class="error-msg" id="err-title" role="alert"></span>
          </div>
          <div class="field">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="field">
            <label for="task-due">Due date</label>
            <input id="task-due" type="date" />
          </div>
        </div>
        <div class="field">
          <label for="task-desc">Description</label>
          <textarea id="task-desc" rows="2" placeholder="Optional notes…"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn--primary" id="submit-btn">Add task</button>
        </div>
      </form>
    </section>

    <div class="toolbar">
      <input type="search" id="search" placeholder="Search tasks…" aria-label="Search tasks" />
      <div class="filter-group" role="group" aria-label="Filter by status">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
      <div class="filter-group" role="group" aria-label="Filter by priority">
        <button class="filter-btn active" data-priority="all">Any priority</button>
        <button class="filter-btn" data-priority="high">High</button>
        <button class="filter-btn" data-priority="medium">Medium</button>
        <button class="filter-btn" data-priority="low">Low</button>
      </div>
      <button class="btn btn--ghost btn--sm" id="clear-completed">Clear completed</button>
    </div>

    <ul class="task-list" id="task-list" role="list" aria-label="Task list"></ul>

    <div class="empty-state" id="empty-state" hidden>
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true">
        <rect x="3" y="5" width="18" height="14" rx="2"/>
        <line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/>
      </svg>
      <p>No tasks found</p>
    </div>

  </main>

  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-label="Edit task" hidden>
    <div class="modal">
      <h2 class="modal-title">Edit task</h2>
      <form id="edit-form" novalidate>
        <input type="hidden" id="edit-id" />
        <div class="field">
          <label for="edit-title">Title <span class="required" aria-hidden="true">*</span></label>
          <input id="edit-title" type="text" />
          <span class="error-msg" id="err-edit-title" role="alert"></span>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="edit-priority">Priority</label>
            <select id="edit-priority">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="field">
            <label for="edit-due">Due date</label>
            <input id="edit-due" type="date" />
          </div>
        </div>
        <div class="field">
          <label for="edit-desc">Description</label>
          <textarea id="edit-desc" rows="2"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn--primary">Save changes</button>
          <button type="button" class="btn btn--ghost" id="modal-close">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
